name: Katabump Auto Renew

on:
  schedule:
    # 每天 UTC 0点 (北京时间 8点) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    # 仅在定时触发 (schedule) 时等待 0 - 60 分钟；手动触发时跳过
    - name: Random Delay (0 - 60 mins)
      if: github.event_name == 'schedule'
      run: |
        DELAY=$((RANDOM % 3600))
        echo "⏰ 定时任务已触发，随机休眠 $DELAY 秒 (约 $((DELAY / 60)) 分钟) 后开始执行..."
        sleep $DELAY
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome
      
    - name: Run Renew Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        SUB_URL: ${{ secrets.SUB_URL }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

    - name: Commit Renew Dates
      if: always()
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add renew_dates.json || true
        git diff --cached --quiet renew_dates.json || git commit -m "chore: update renew dates [skip ci]"
        for i in {1..5}; do
          git pull --rebase --autostash || true
          if git push; then
            break
          fi
          echo "⚠️ Push failed, retrying in 5 seconds ($i/5)..."
          sleep 5
        done

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: screenshots
        path: screenshots/
